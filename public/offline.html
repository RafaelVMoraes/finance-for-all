<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Finance for All</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      main {
        width: min(90vw, 480px);
        text-align: center;
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      h1 { margin-top: 0; font-size: 1.5rem; }
      p { line-height: 1.5; margin-bottom: 0; }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>
        Finance for All is unavailable right now. Your app shell is still available,
        and you'll be back online automatically when your connection returns.
      </p>
    </main>
  </body>
</html>
